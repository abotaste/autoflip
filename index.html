<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f;--card:#0e0e1c;--card2:#141428;--border:#1e1e36;
  --green:#00e87a;--red:#ff3c5a;--gold:#ffb800;--blue:#4d8dff;
  --text:#eeeeff;--muted:#55557a;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  color:var(--text);display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;height:100%;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% -5%,rgba(0,232,122,.06),transparent);
  pointer-events:none;
}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;flex-shrink:0}
.logo{font-family:'Bebas Neue',Impact,fantasy;font-size:30px;letter-spacing:2px;background:linear-gradient(120deg,#00e87a,#00c4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-right{display:flex;gap:8px;align-items:center}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(0,232,122,.07);border:1px solid rgba(0,232,122,.18);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--green);font-weight:700;letter-spacing:.5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite;box-shadow:0 0 5px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.saved-btn{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text);transition:all .2s}
.saved-btn:active{transform:scale(.95)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px 12px;flex-shrink:0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 8px;text-align:center}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-v{font-family:'Bebas Neue',Impact,fantasy;font-size:21px;color:var(--green)}

/* CARD AREA */
.card-area{flex:1;position:relative;padding:0 20px;overflow:hidden}
.stack-wrap{position:absolute;inset:0 20px}
.stack-bg{position:absolute;inset:0;background:var(--card);border:1px solid var(--border);border-radius:20px;transform-origin:bottom center}
.stack-bg:nth-child(1){transform:translateY(7px) scale(.96);opacity:.4}
.stack-bg:nth-child(2){transform:translateY(14px) scale(.92);opacity:.2}
.deal-card{position:absolute;inset:0;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.deal-card::-webkit-scrollbar{display:none}
.hint{position:absolute;top:16px;padding:6px 14px;border-radius:8px;font-family:'Bebas Neue',Impact,fantasy;font-size:20px;letter-spacing:1px;opacity:0;pointer-events:none;z-index:10}
.h-save{left:14px;background:rgba(0,232,122,.12);border:2px solid var(--green);color:var(--green)}
.h-skip{right:14px;background:rgba(255,60,90,.12);border:2px solid var(--red);color:var(--red)}

/* CARD CONTENT */
.c-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,rgba(255,255,255,.015),transparent)}
.c-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
.b-hot{background:rgba(255,60,90,.14);color:var(--red);border:1px solid rgba(255,60,90,.3)}
.b-dmg{background:rgba(255,184,0,.1);color:var(--gold);border:1px solid rgba(255,184,0,.25)}
.b-hyb{background:rgba(77,141,255,.1);color:var(--blue);border:1px solid rgba(77,141,255,.25)}
.b-urg{background:rgba(255,130,60,.1);color:#ff9060;border:1px solid rgba(255,130,60,.25)}
.b-ok{background:rgba(0,232,122,.07);color:var(--green);border:1px solid rgba(0,232,122,.18)}
.b-new{background:rgba(180,100,255,.1);color:#c87aff;border:1px solid rgba(180,100,255,.25)}
.c-title{font-family:'Bebas Neue',Impact,fantasy;font-size:26px;letter-spacing:.5px;line-height:1.1;margin-bottom:4px}
.c-sub{font-size:12px;color:var(--muted)}

.c-price{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.price-box{padding:13px 16px;border-right:1px solid var(--border)}
.price-box:last-child{border-right:none}
.price-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.price-num{font-family:'Bebas Neue',Impact,fantasy;font-size:28px;line-height:1}
.p-ask{color:var(--text)}.p-bid{color:var(--gold)}.p-sell{color:var(--green)}

.winst-bar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:linear-gradient(135deg,rgba(0,232,122,.05),rgba(0,196,255,.03));border-bottom:1px solid rgba(0,232,122,.1)}
.winst-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.winst-sub{font-size:12px;color:var(--muted)}
.winst-num{font-family:'Bebas Neue',Impact,fantasy;font-size:28px;color:var(--green)}
.winst-perc{font-size:13px;opacity:.55}

.c-specs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.spec-box{background:var(--card);padding:11px 16px}
.spec-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.spec-v{font-size:13px;font-weight:600}

.c-desc{padding:13px 16px;border-bottom:1px solid var(--border)}
.c-desc-text{font-size:12px;color:var(--muted);line-height:1.65}
.opties{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.optie{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--muted)}

.c-contact{padding:14px 16px;background:var(--card2);border-bottom:1px solid var(--border)}
.contact-name{font-size:15px;font-weight:700;margin-bottom:2px}
.contact-meta{font-size:11px;color:var(--muted);margin-bottom:10px}
.contact-phone{font-family:'Bebas Neue',Impact,fantasy;font-size:26px;color:var(--green);letter-spacing:.5px;margin-bottom:11px}
.ext-links{display:flex;gap:7px}
.ext-link{flex:1;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 4px;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;transition:all .15s}
.ext-link:active{transform:scale(.95)}
.ext-bel{color:var(--green);border-color:rgba(0,232,122,.2);background:rgba(0,232,122,.05)}
.ext-mp{color:var(--blue);border-color:rgba(77,141,255,.2);background:rgba(77,141,255,.05)}

.c-prog{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px}
.prog-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .25s}
.prog-dot.active{background:var(--green);transform:scale(1.4);box-shadow:0 0 5px var(--green)}
.prog-dot.done{background:var(--muted)}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:10px;padding:10px 20px 26px;flex-shrink:0}
.btn{border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn:active{transform:scale(.91)}
.btn-skip{background:rgba(255,60,90,.08);border:1px solid rgba(255,60,90,.2);color:var(--red);padding:14px 8px}
.btn-save{background:linear-gradient(135deg,#00e87a,#00c4ff);color:#000;padding:16px 8px;font-weight:700;box-shadow:0 4px 24px rgba(0,232,122,.2)}
.btn-next{background:rgba(77,141,255,.08);border:1px solid rgba(77,141,255,.2);color:var(--blue);padding:14px 8px}
.btn-icon{font-size:24px}
.btn-lbl{font-size:10px;font-weight:700;opacity:.65;text-transform:uppercase;letter-spacing:.6px}

/* LOADING / EMPTY */
.state-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:30px}
.state-icon{font-size:54px}
.state-title{font-family:'Bebas Neue',Impact,fantasy;font-size:30px;letter-spacing:.5px}
.state-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:280px}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.reload-btn{background:linear-gradient(135deg,#00e87a,#00c4ff);color:#000;border:none;border-radius:14px;padding:13px 30px;font-family:'Bebas Neue',Impact,fantasy;font-size:20px;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 20px rgba(0,232,122,.2)}

/* SAVED PANEL */
#saved-panel{position:fixed;inset:0;background:var(--bg);z-index:80;display:none;flex-direction:column;max-width:430px;margin:0 auto}
.saved-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.saved-header h2{font-family:'Bebas Neue',Impact,fantasy;font-size:26px;color:var(--green)}
.close-btn{background:var(--card2);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;cursor:pointer;color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center}
#saved-list{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.saved-item{background:var(--card);border:1px solid rgba(0,232,122,.15);border-radius:16px;padding:15px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.si-name{font-size:14px;font-weight:700;margin-bottom:3px}
.si-meta{font-size:11px;color:var(--muted);margin-bottom:5px}
.si-winst{font-family:'Bebas Neue',Impact,fantasy;font-size:22px;color:var(--green);text-align:right}
.si-lbl{font-size:10px;color:var(--muted);text-align:right}
.mp-btn{display:inline-block;margin-top:8px;background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);color:var(--green);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;text-decoration:none;text-align:center}
.empty-saved{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-saved .ei{font-size:52px;margin-bottom:12px}
</style>

<div class="topbar">
  <div class="logo">AutoFlip</div>
  <div class="top-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="saved-btn" onclick="openSaved()">💾 <span id="saved-count">0</span></div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-l">Live deals</div><div class="stat-v" id="s-leads">—</div></div>
  <div class="stat"><div class="stat-l">Gem. winst</div><div class="stat-v" id="s-marge">—</div></div>
  <div class="stat"><div class="stat-l">Beste deal</div><div class="stat-v" id="s-best">—</div></div>
</div>

<div class="card-area">
  <div class="stack-wrap">
    <div class="stack-bg"></div>
    <div class="stack-bg"></div>
  </div>
  <div class="deal-card" id="deal-card">
    <div class="state-card">
      <div class="spinner"></div>
      <div class="state-title">Marktplaats laden...</div>
      <div class="state-sub">Echte advertenties ophalen</div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-skip" onclick="skipDeal()"><span class="btn-icon">✕</span><span class="btn-lbl">Skip</span></button>
  <button class="btn btn-save" onclick="saveDeal()"><span class="btn-icon">💾</span><span class="btn-lbl">Opslaan</span></button>
  <button class="btn btn-next" onclick="nextDeal()"><span class="btn-icon">→</span><span class="btn-lbl">Volgende</span></button>
</div>

<div id="saved-panel">
  <div class="saved-header">
    <h2>💾 Opgeslagen</h2>
    <button class="close-btn" onclick="closeSaved()">✕</button>
  </div>
  <div id="saved-list"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────
// Marktplaats categorie IDs voor auto's
// l1CategoryId=91 = Auto's
// Zoektermen rouleren voor maximale coverage
const SEARCHES = [
  { q: 'toyota yaris',    maxPrijs: 5000 },
  { q: 'kia picanto',     maxPrijs: 5000 },
  { q: 'volkswagen polo', maxPrijs: 5000 },
  { q: 'suzuki swift',    maxPrijs: 5000 },
  { q: 'opel corsa',      maxPrijs: 5000 },
];

// Geschatte verkoopprijzen per model (realistische marktdata NL)
const VERKOOPPRIJZEN = {
  'yaris':   { basis: 1800, perJaar: 300, perKm: 0.008 },
  'picanto': { basis: 1600, perJaar: 280, perKm: 0.007 },
  'polo':    { basis: 2000, perJaar: 350, perKm: 0.009 },
  'swift':   { basis: 1900, perJaar: 320, perKm: 0.008 },
  'corsa':   { basis: 1700, perJaar: 290, perKm: 0.007 },
  'fiesta':  { basis: 1500, perJaar: 260, perKm: 0.007 },
  'default': { basis: 1800, perJaar: 300, perKm: 0.008 },
};

// CORS proxies (probeer achtereenvolgens)
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://cors-anywhere.herokuapp.com/',
];

// ─── STATE ────────────────────────────────────────────────────────────
let deals = [];
let cur = 0;
let saved = [];
let isAnim = false;
let tx0=0,ty0=0,dx=0,drag=false;

// ─── BOOT ─────────────────────────────────────────────────────────────
laadDeals();

// ─── DATA OPHALEN ─────────────────────────────────────────────────────
async function laadDeals() {
  setLoading('Marktplaats scannen...', 'Echte advertenties ophalen');
  
  const alleItems = [];
  
  // Probeer meerdere zoekopdrachten
  for (const search of SEARCHES) {
    try {
      const items = await zoekMarktplaats(search.q, search.maxPrijs);
      alleItems.push(...items);
      if (alleItems.length >= 15) break;
    } catch(e) {
      console.warn('Zoek fout:', search.q, e.message);
    }
  }
  
  if (alleItems.length === 0) {
    toonFout('Geen verbinding', 'Kan Marktplaats niet bereiken. Controleer je internetverbinding en probeer opnieuw.');
    return;
  }

  // Verwerk en sorteer op beste marge
  deals = alleItems
    .map(verwerkItem)
    .filter(d => d !== null)
    .sort((a, b) => (b.winst / b.vraagprijs) - (a.winst / a.vraagprijs));

  updateStats();
  cur = 0;
  render();
  initTouch();
}

async function zoekMarktplaats(query, maxPrijs) {
  const mpUrl = `https://www.marktplaats.nl/lrp/api/search?query=${encodeURIComponent(query)}&l1CategoryId=91&priceTo=${maxPrijs}&limit=10&offset=0&sortBy=SORT_INDEX&sortOrder=DECREASING`;
  
  // Probeer elke proxy
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(mpUrl), {
        headers: { 'Accept': 'application/json' },
        signal: AbortSignal.timeout(8000)
      });
      
      if (!res.ok) continue;
      
      const data = await res.json();
      const listings = data.listings || data.data?.listings || [];
      return listings;
      
    } catch(e) {
      console.warn(`Proxy ${proxy} mislukt:`, e.message);
    }
  }
  
  throw new Error('Alle proxies mislukt');
}

function verwerkItem(item) {
  try {
    // Haal prijs op
    const vraagprijs = item.priceInfo?.priceCents 
      ? Math.round(item.priceInfo.priceCents / 100)
      : item.price?.amount || 0;
    
    if (!vraagprijs || vraagprijs < 300 || vraagprijs > 6000) return null;
    
    const titel = item.title || item.l3CategoryName || 'Auto';
    const beschrijving = item.description || item.shortDescription || '';
    const locatie = item.location?.cityName || item.sellerLocation?.cityName || 'Nederland';
    const url = item.vipUrl 
      ? `https://www.marktplaats.nl${item.vipUrl}`
      : `https://www.marktplaats.nl/l/auto-s/`;
    
    // Detecteer model voor margeberekening
    const titelLower = titel.toLowerCase();
    const modelKey = Object.keys(VERKOOPPRIJZEN).find(k => titelLower.includes(k)) || 'default';
    const mp = VERKOOPPRIJZEN[modelKey];
    
    // Schat bouwjaar en km uit tekst als niet beschikbaar
    const bouwjaar = item.attributes?.find(a => a.key === 'constructionYear')?.value 
      || extractGetal(beschrijving + ' ' + titel, /20\d\d|199\d/) 
      || 2013;
    
    const km = item.attributes?.find(a => a.key === 'mileage')?.value
      || extractGetal(beschrijving, /(\d+)[\.\s]?(\d{3})\s*km/i, true)
      || 120000;
    
    // Bereken verwachte verkoopprijs
    const ouderdom = new Date().getFullYear() - parseInt(bouwjaar);
    const verwacht = Math.round(
      vraagprijs * 1.25 + // Marge bovenop inkoop
      Math.max(0, mp.perJaar * (10 - ouderdom)) -
      (parseInt(km) * mp.perKm * 0.1)
    );
    const verwachteVerkoop = Math.max(vraagprijs + 400, Math.min(verwacht, vraagprijs * 1.6));
    
    const biedAdvies = Math.round(vraagprijs * 0.82);
    const winst = verwachteVerkoop - biedAdvies;
    
    // Bepaal soort en hot
    const descLower = beschrijving.toLowerCase();
    const soort = descLower.includes('schade') || descLower.includes('deuk') || descLower.includes('kras') 
      ? 'schade'
      : descLower.includes('hybrid') || titelLower.includes('hybrid') 
      ? 'hybrid'
      : descLower.includes('snel weg') || descLower.includes('emigrat') || descLower.includes('urgent')
      ? 'urgent'
      : 'rijklaar';
    
    const winstPerc = winst / biedAdvies;
    const hot = winstPerc > 0.25 || soort === 'urgent';
    
    // Foto
    const foto = item.pictures?.[0]?.mediumUrl 
      || item.imageUrls?.[0]
      || null;
    
    return {
      titel, beschrijving: beschrijving.slice(0, 200),
      vraagprijs, biedAdvies, verwachteVerkoop, winst,
      bouwjaar: parseInt(bouwjaar),
      km: parseInt(km),
      locatie, url, foto,
      soort, hot,
      verkoper: item.sellerInformation?.displayName || 'Particulier',
      datum: item.date || 'Recent geplaatst',
    };
  } catch(e) {
    return null;
  }
}

function extractGetal(tekst, regex, dubbel = false) {
  const match = tekst.toString().match(regex);
  if (!match) return null;
  if (dubbel && match[2]) return parseInt(match[1] + match[2]);
  return parseInt(match[0]);
}

// ─── UI ───────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-leads').textContent = deals.length;
  if (deals.length > 0) {
    const marges = deals.map(d => d.winst);
    const gem = Math.round(marges.reduce((a,b)=>a+b,0)/marges.length);
    document.getElementById('s-marge').textContent = '€'+gem.toLocaleString('nl-NL');
    document.getElementById('s-best').textContent = '€'+Math.max(...marges).toLocaleString('nl-NL');
  }
}

function render() {
  const card = document.getElementById('deal-card');
  card.style.cssText = 'transform:none;opacity:1;transition:none';

  if (cur >= deals.length) {
    card.innerHTML = `<div class="state-card">
      <div class="state-icon">✅</div>
      <div class="state-title">Batch klaar!</div>
      <div class="state-sub">Je hebt alle ${deals.length} deals bekeken. Nieuwe batch laden?</div>
      <button class="reload-btn" onclick="laadDeals()">⚡ Nieuwe deals</button>
    </div>`;
    return;
  }

  const d = deals[cur];
  const perc = Math.round(d.winst / d.biedAdvies * 100);

  const badges = [];
  if (d.hot)             badges.push('<span class="badge b-hot">🔥 HOT DEAL</span>');
  if (d.soort==='schade') badges.push('<span class="badge b-dmg">⚠️ SCHADE</span>');
  if (d.soort==='urgent') badges.push('<span class="badge b-urg">⏰ URGENT</span>');
  if (d.soort==='hybrid') badges.push('<span class="badge b-hyb">⚡ HYBRIDE</span>');
  if (d.soort==='rijklaar'&&!d.hot) badges.push('<span class="badge b-ok">✅ RIJKLAAR</span>');
  badges.push('<span class="badge b-new">🔴 LIVE</span>');

  const dots = deals.slice(0, Math.min(deals.length, 12)).map((_,i) =>
    `<div class="prog-dot ${i===cur?'active':i<cur?'done':''}"></div>`
  ).join('');

  const fotoHtml = d.foto 
    ? `<img src="${d.foto}" style="width:100%;height:160px;object-fit:cover;border-bottom:1px solid var(--border)" onerror="this.style.display='none'">`
    : '';

  card.innerHTML = `
    <div class="hint h-save" id="hs">OPSLAAN ✓</div>
    <div class="hint h-skip" id="hk">SKIP ✕</div>
    ${fotoHtml}
    <div class="c-head">
      <div class="c-badges">${badges.join('')}</div>
      <div class="c-title">${d.titel}</div>
      <div class="c-sub">📍 ${d.locatie} · ${d.datum}</div>
    </div>

    </div>

}

function setLoading(titel, sub) {
  document.getElementById('deal-card').innerHTML = `
    <div class="state-card">
      <div class="spinner"></div>
      <div class="state-title">${titel}</div>
      <div class="state-sub">${sub}</div>
    </div>`;
}

function toonFout(titel, sub) {
  document.getElementById('deal-card').innerHTML = `
    <div class="state-card">
      <div class="state-icon">⚠️</div>
      <div class="state-title">${titel}</div>
      <div class="state-sub">${sub}</div>
      <button class="reload-btn" onclick="laadDeals()">↻ Opnieuw proberen</button>
    </div>`;
}

// ─── SWIPE ────────────────────────────────────────────────────────────
function initTouch() {
  const card = document.getElementById('deal-card');
  card.addEventListener('touchstart', e => {
    if(isAnim)return;
    tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;dx=0;drag=false;
  },{passive:true});
  
  card.addEventListener('touchmove', e => {
    if(isAnim)return;
    const ddx=e.touches[0].clientX-tx0,ddy=e.touches[0].clientY-ty0;
    if(!drag&&Math.abs(ddy)>Math.abs(ddx))return;
    drag=true;e.preventDefault();dx=ddx;
    const c=document.getElementById('deal-card');
    c.style.transition='none';
    c.style.transform=`translateX(${dx}px) rotate(${dx*.04}deg)`;
    const hs=document.getElementById('hs'),hk=document.getElementById('hk');
    if(hs&&hk){
      hs.style.opacity=dx>60?Math.min((dx-60)/80,1):0;
      hk.style.opacity=dx<-60?Math.min((-dx-60)/80,1):0;
    }
  },{passive:false});
  
  card.addEventListener('touchend', () => {
    if(!drag)return;drag=false;
    if(dx>100)saveDeal();
    else if(dx<-100)skipDeal();
    else{
      const c=document.getElementById('deal-card');
      c.style.transition='transform .3s cubic-bezier(.22,.68,0,1.2)';
      c.style.transform='none';
      const hs=document.getElementById('hs'),hk=document.getElementById('hk');
      if(hs)hs.style.opacity=0;if(hk)hk.style.opacity=0;
    }
  },{passive:true});
}

// ─── ACTIONS ──────────────────────────────────────────────────────────
function animOut(dir, cb) {
  isAnim=true;
  const c=document.getElementById('deal-card');
  c.style.transition='transform .28s ease,opacity .28s ease';
  c.style.transform=`translateX(${dir==='r'?480:-480}px) rotate(${dir==='r'?14:-14}deg)`;
  c.style.opacity='0';
  setTimeout(()=>{isAnim=false;cb();initTouch();},280);
}

function skipDeal(){if(!isAnim)animOut('l',()=>{cur++;render();})}
function nextDeal(){if(!isAnim)animOut('l',()=>{cur++;render();})}
function saveDeal(){
  if(isAnim||cur>=deals.length)return;
  saved.push(deals[cur]);
  document.getElementById('saved-count').textContent=saved.length;
  renderSaved();
  animOut('r',()=>{cur++;render();});
}

// ─── SAVED ────────────────────────────────────────────────────────────
function openSaved(){const p=document.getElementById('saved-panel');p.style.display='flex';p.style.flexDirection='column';}
function closeSaved(){document.getElementById('saved-panel').style.display='none';}

function renderSaved(){
  const list=document.getElementById('saved-list');
  if(!saved.length){
    list.innerHTML='<div class="empty-saved"><div class="ei">📭</div><p>Nog niets opgeslagen.<br>Swipe rechts of druk 💾.</p></div>';
    return;
  }
  list.innerHTML=saved.map(d=>`
    <div class="saved-item">
      <div>
        <div class="si-name">${d.titel}</div>
        <div class="si-meta">📍 ${d.locatie} · bod <strong style="color:var(--gold)">€${d.biedAdvies.toLocaleString('nl-NL')}</strong></div>
        <a class="mp-btn" href="${d.url}" target="_blank">🔗 Open advertentie op Marktplaats</a>
      </div>
      <div style="flex-shrink:0">
        <div class="si-winst">+€${d.winst.toLocaleString('nl-NL')}</div>
        <div class="si-lbl">winst</div>
      </div>
    </div>`).join('');
}
</script>
